version: "3.1"

intents:
  - greet
  - recommend_japan
  - ask_weather
  - recommend_destination
  - bot_challenge

responses:
  utter_greet:
    - text: "안녕하세요! 일본 여행지 추천 챗봇입니다. 궁금한 점을 말씀해 주세요."
  utter_recommend_japan:
    - text: |
        일본에서 인기 있는 여행지는 다음과 같습니다:
        1. 도쿄(도쿄타워, 아사쿠사, 시부야)
        2. 오사카(도톤보리, 유니버설 스튜디오)
        3. 교토(기온, 금각사, 후시미이나리)
        4. 홋카이도(삿포로, 오타루, 후라노)
        5. 오키나와(츄라우미 수족관, 국제거리)
        원하는 지역이나 테마가 있으면 말씀해 주세요!
  utter_goodbye:
    - text: "안녕히 가세요! 다음에 또 만나요."
  utter_iamabot:
    - text: "저는 챗봇이에요. 궁금한 점이 있으면 언제든 물어보세요!"
  utter_cheer_up:
    - text: "힘내세요! 곧 좋은 일이 생길 거예요 😊"
  utter_did_that_help:
    - text: "도움이 되었나요?"
  utter_happy:
    - text: "좋아요! 도움이 되어 기쁩니다."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

actions:
  - action_get_realtime_data
  - action_db_query

slots:
  location:
    type: text
    mappings:
      - type: from_text

stories:
  - story: 실시간 날씨 정보
    steps:
      - intent: ask_weather
      - action: action_get_realtime_data
