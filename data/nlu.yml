version: "3.1"

nlu:
  - intent: greet
    examples: |
      - 안녕
      - 안녕하세요
      - 하이

  - intent: recommend_destination
    examples: |
      - 여행지 추천해줘
      - 일본 여행지 추천해줘
      - 도쿄, 오사카, 교토 중 어디가 좋아?
      - 도쿄, 오사카, 교토 중 추천해줘
      - 일본에서 추천하는 도시 있어?
      - 도쿄, 오사카, 교토 중 어디가 제일 좋아?
      - 도쿄, 오사카, 교토 중 어디가 더 재밌어?

  - intent: plan_trip
    examples: |
      - [도쿄](city)
      - [오사카](city)
      - [교토](city)
      - 도쿄
      - 오사카
      - 교토
      - 도쿄 여행
      - 오사카 여행
      - 교토 여행
      - 도쿄로 여행 가고 싶어
      - 오사카로 여행 가고 싶어
      - 교토로 여행 가고 싶어
      - 도쿄 일정 추천
      - 오사카 일정 추천
      - 교토 일정 추천
      - [도쿄](city) 여행 계획 세워줘
      - [오사카](city) 2박3일 여행 코스 추천해줘
      - [교토](city)에서 가볼만한 곳 알려줘
      - [도쿄](city)에서 맛집 추천해줘
      - [오사카](city) 여행 일정 추천해줘
      - [교토](city) 여행 코스 알려줘

  - intent: goodbye
    examples: |
      - 잘 가
      - 잘가
      - 안녕히 계세요
      - 다음에 또 올게
      - 안녕
      - 또 봐
      - 다음에 봐
      - 바이
      - goodbye
      - bye

  - intent: bot_challenge
    examples: |
      - 너 챗봇이야?
      - 너 누구야?
      - 너는 사람이야?

  - intent: fallback
    examples: |
      - 아무거나 추천해줘
      - [이해할 수 없는 질문 예시]
      - [모호한 질문 예시]
      - [명확하지 않은 질문 예시]
